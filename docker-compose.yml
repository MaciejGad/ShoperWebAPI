version: '3.8'

services:
  shoper-webapi-tests:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount source code for development
      - .:/workspace
      # Exclude build artifacts from host
      - /workspace/.build
    working_dir: /workspace
    command: swift test
    
  # Development service for interactive use
  shoper-webapi-dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
      - /workspace/.build
    working_dir: /workspace
    command: bash
    stdin_open: true
    tty: true